<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Bersamo</title>
    <link rel="stylesheet" href="css.css"/>
    <script src="scripts.js" defer></script>
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
  </head>
  <body>
    <main class="main-container">
      <section class="right">
        <h1 class="title">¡Te damos la bienvenida!</h1>
        <form id="formulario" class="form-container" action="login.php">
          <label class="username" for="correo">
            <input
              id="correo"
              type="email"
              class="user-input"
              placeholder="Dirección de email"
              required
            />
          </label>
          <p id="erroCorreo" class="errorMensajeForm"></p>
          <div id="contra">
            <label class="password" for="contrasena">
              <input
                id="contrasena"
                type="password"
                class="pass-input"
                placeholder="Contraseña"
                required
              />
            </label>
            <p id="errorContrasena" class="errorMensajeForm"></p>
          </div>

          <button type="submit" id="enviar">Acceder a Bersamo</button>
        </form>
      </section>
    </main>
